<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <style>

        *{

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{

            background: #0f172a;
            color: white;
            padding: 30px;
        }

        h1{

            text-align: center;
            margin-bottom: 30px;
            color: cyan;
        }

        h2{

            margin-top: 30px;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        input{

            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        button{

            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .add-btn{

            background: cyan;
            color: black;
        }

        .add-btn:hover{

            background: white;
        }

        .delete-btn{

            background: red;
            color: white;
        }

        .edit-btn{

            background: orange;
            color: white;
        }

        .card{

            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        img{

            width: 100%;
            max-width: 300px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        a{

            color: cyan;
            text-decoration: none;
        }

    </style>

</head>

<body>

    <h1>Admin Dashboard 😎🔥</h1>

    <div class="card">

        <h2>Add Project 🚀</h2>

        <input type="text"
        id="title"
        placeholder="Project Title">

        <input type="text"
        id="description"
        placeholder="Project Description">

        <input type="text"
        id="github"
        placeholder="GitHub Link">

        <input type="text"
        id="image"
        placeholder="Image URL">

        <button class="add-btn"
        onclick="addProject()">

            Add Project

        </button>

    </div>

    <div class="card">

        <h2>All Projects 🚀</h2>

        <div id="projects"></div>

    </div>

    <div class="card">

        <h2>All Messages 📩</h2>

        <div id="messages"></div>

    </div>

<script>

async function addProject(){

    const title =
    document.getElementById("title").value;

    const description =
    document.getElementById("description").value;

    const github =
    document.getElementById("github").value;

    const image =
    document.getElementById("image").value;

    await fetch("http://localhost:5000/add-project", {

        method: "POST",

        headers: {

            "Content-Type":
            "application/json"
        },

        body: JSON.stringify({

            title,
            description,
            github,
            image
        })
    });

    alert("Project Added 😎🔥");

    location.reload();
}

/* LOAD MESSAGES */

async function loadMessages(){

    const response =
    await fetch("http://localhost:5000/messages");

    const data =
    await response.json();

    const messagesDiv =
    document.getElementById("messages");

    messagesDiv.innerHTML = "";

    data.forEach(msg => {

        messagesDiv.innerHTML += `

        <div class="card">

            <h3>${msg.name}</h3>

            <br>

            <p>${msg.email}</p>

            <br>

            <p>${msg.message}</p>

            <br>

            <button class="delete-btn"
            onclick="deleteMessage('${msg._id}')">

                Delete

            </button>

        </div>
        `;
    });
}

/* DELETE MESSAGE */

async function deleteMessage(id){

    await fetch(

    `http://localhost:5000/messages/${id}`,

    {

        method: "DELETE"
    });

    location.reload();
}

/* LOAD PROJECTS */

async function loadProjects(){

    const response =
    await fetch("http://localhost:5000/projects");

    const data =
    await response.json();

    const projectsDiv =
    document.getElementById("projects");

    projectsDiv.innerHTML = "";

    data.forEach(project => {

        projectsDiv.innerHTML += `

        <div class="card">

            <img src="${project.image}">

            <h3>${project.title}</h3>

            <br>

            <p>${project.description}</p>

            <br>

            <a href="${project.github}"
            target="_blank">

                GitHub Link

            </a>

            <br><br>

            <button class="edit-btn"

            onclick="editProject(

            '${project._id}',
            '${project.title}',
            '${project.description}',
            '${project.github}',
            '${project.image}'

            )">

                Edit Project

            </button>

            <br><br>

            <button class="delete-btn"

            onclick="deleteProject('${project._id}')">

                Delete Project

            </button>

        </div>
        `;
    });
}

/* DELETE PROJECT */

async function deleteProject(id){

    await fetch(

    `http://localhost:5000/delete-project/${id}`,

    {

        method: "DELETE"
    });

    location.reload();
}

/* EDIT PROJECT */

async function editProject(

    id,
    oldTitle,
    oldDescription,
    oldGithub,
    oldImage

){

    const title =
    prompt("Edit Title", oldTitle);

    const description =
    prompt("Edit Description", oldDescription);

    const github =
    prompt("Edit GitHub", oldGithub);

    const image =
    prompt("Edit Image URL", oldImage);

    await fetch(

    `http://localhost:5000/update-project/${id}`,

    {

        method: "PUT",

        headers: {

            "Content-Type":
            "application/json"
        },

        body: JSON.stringify({

            title,
            description,
            github,
            image
        })
    });

    alert("Project Updated 😎🔥");

    location.reload();
}

loadMessages();
loadProjects();

</script>

</body>

</html>
